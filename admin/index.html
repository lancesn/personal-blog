<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lance Blog Studio</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body class="studio-page">
    <main class="studio-shell">
      <section class="studio-header">
        <div>
          <p class="studio-kicker">Local Studio</p>
          <h1>文章后台</h1>
          <p>新建、编辑、删除文章后，会重新生成 GitHub Pages 用的静态网页。</p>
        </div>
        <a class="button dark" href="../dist/index.html">预览网站</a>
      </section>

      <section class="studio-workspace">
        <aside class="studio-panel">
          <div class="studio-panel-head">
            <h2>文章列表</h2>
            <button class="button primary" id="new-post" type="button">新建</button>
          </div>
          <div class="studio-posts" id="post-list"></div>
          <nav class="studio-pagination" id="post-pagination" aria-label="后台文章分页"></nav>
        </aside>

        <form class="studio-form" id="post-form">
          <input name="slug" type="hidden" />
          <label>
            <span>标题</span>
            <input name="title" type="text" placeholder="例如：我的第一篇长文" required />
          </label>

          <div class="studio-grid">
            <label>
              <span>发布日期</span>
              <input name="date" type="date" required />
            </label>
            <label>
              <span>阅读时间</span>
              <input name="readingTime" type="text" placeholder="3 分钟阅读" />
            </label>
          </div>

          <div class="studio-grid">
            <label>
              <span>标签</span>
              <input name="tags" type="text" placeholder="多个标签用英文逗号分隔，例如：禅宗史, 读书" />
            </label>
            <label>
              <span>状态</span>
              <select name="status">
                <option value="published">发布</option>
                <option value="draft">草稿</option>
              </select>
            </label>
          </div>

          <label>
            <span>摘要</span>
            <textarea name="description" rows="3" placeholder="可选。不填时会从正文自动摘取。"></textarea>
          </label>

          <label>
            <span>正文 Markdown</span>
            <div class="studio-toolbar">
              <button class="button" id="insert-image" type="button">插入图片</button>
              <input id="image-file" type="file" accept="image/*" hidden />
            </div>
            <textarea
              class="studio-body"
              name="body"
              rows="18"
              placeholder="这里写正文。支持 ## 小标题、- 列表、表格、**加粗**、[链接](https://example.com)。"
              required
            ></textarea>
          </label>

          <div class="studio-actions">
            <button class="button primary" type="submit" id="save-post">保存并生成网页</button>
            <button class="button danger" type="button" id="delete-post" hidden>删除文章</button>
            <p id="status" role="status"></p>
          </div>
        </form>
      </section>

      <section class="studio-help">
        <h2>发布到线上</h2>
        <p>保存成功后，可以一键提交并推送到 GitHub，GitHub Pages 会自动发布。</p>
        <button class="button primary" id="publish-site" type="button">发布到 GitHub</button>
        <code>git add . && git commit -m "Add post" && git push</code>
      </section>
    </main>
    <script src="./admin.js"></script>
  </body>
</html>
