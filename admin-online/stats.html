<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>阅读统计 · 蓬窗灯影录 Online Studio</title>
    <link rel="stylesheet" href="../styles.css?v=20260721-stats-geo-precision" />
  </head>
  <body class="studio-page">
    <main class="studio-shell">
      <section class="studio-header">
        <div>
          <p class="studio-kicker">Online Studio</p>
          <h1>阅读统计</h1>
          <p>统计公开页面的访问次数，按地区和文章分别汇总。</p>
        </div>
        <div class="studio-header-actions">
          <button class="theme-toggle" type="button" aria-label="切换深浅色">☼</button>
          <a class="button dark" href="./index.html">返回后台</a>
        </div>
      </section>

      <section class="studio-help">
        <h2>连接后台</h2>
        <p>使用与发布后台相同的 Worker 地址和密码。</p>
        <div class="studio-grid">
          <label>
            <span>Worker 地址</span>
            <input id="worker-url" type="url" value="https://silencegate-blog-admin.lanceshen.workers.dev" />
          </label>
          <label>
            <span>后台密码</span>
            <input id="admin-password" type="password" placeholder="输入后台密码" autocomplete="current-password" />
          </label>
        </div>
        <label class="studio-remember">
          <input id="remember-password" type="checkbox" />
          <span>记住密码（保存在此浏览器，关闭后不用重新输入）</span>
        </label>
        <div class="studio-actions">
          <button class="button primary" id="load-stats" type="button">查看统计</button>
          <button class="button" id="forget-password" type="button">清除密码</button>
          <p id="stats-status" role="status"></p>
        </div>
      </section>

      <section class="studio-help" id="stats-results" hidden>
        <h2>统计结果</h2>
        <p id="stats-total"></p>
        <div class="studio-grid">
          <div>
            <h3>按地区</h3>
            <table class="stats-table" id="stats-by-location"></table>
          </div>
          <div>
            <h3>按文章</h3>
            <table class="stats-table" id="stats-by-path"></table>
          </div>
        </div>
      </section>
    </main>
    <script src="../script.js?v=20260721-stats-geo-precision"></script>
    <script src="./stats.js?v=20260721-stats-geo-precision"></script>
  </body>
</html>
