          <article class="post-card" data-search-card data-title="尘劳既是解脱门路" data-tags="散文" data-body="一杯水搁在桌上，水汽袅袅升起，像一缕极轻的烟，眼中能看见的那种轻。端起来喝了一口，热气从喉间一路下去，胸口微微发暖。就这样一件小事。可若问，道在哪里？祖师的回答放在这里，平平淡淡：道非远求，即在当处。 我们总以为修行要走很远的路。走进深山，找一位老和尚；翻到一卷经文的最深处，抠出一个秘义；或者走到生命的尽头，等一个豁然开朗的时刻。可祖师们偏偏说，不必。脚下这一寸地方就是。喝水的时候，水就是；走路的时候，脚就是；坐在窗前出神的时候，那出神的一念就是。问题从来与地点无关，要看朝向。修行二字常常被神化，神化之后人人都觉得自己不够格，于是把它供起来，远远地拜，不敢近前。可道理一旦还原，就还原到这样一杯水、这样一抬脚。 什么叫朝向？一个人活着，眼睛大半时候往外看。看手机里的消息，看别人的脸色，看远处那件还没到手的事。心也跟着眼睛跑出去，跑到外面算计，贪图，焦虑。一天下来，整个人像一只被风吹得鼓鼓的袋子，里头其实空空的。祖师讲举足回光，这四个字极妙。举足，是要动起来；回光，是把那道往外照的光线，悄悄收回来，照向自己。一抬脚的工夫，方向就反过来了。 回光照见什么呢？照见此刻正在喝水的自己，照见呼吸一来一去，照见念头怎样生起、怎样灭去。原先看出去全是事情，回过头看进来全是自己。这一看，妙处就出来了：原来扰乱我的那些事，没有一件是从外面闯进来的，全是我自己一念一念接出去的。念头一旦不向外驰骋，外界那些波涛就拍不到岸上来。心里这么一静，世界还是那个吵闹的世界，安静下来的，是我自己。 尘劳两个字，用得真好。尘是细密的颗粒，劳是疲累的奔走。日常的烦恼，多半就是这个样子，琐碎而消耗。爱一个人累，恨一个人也累，做一件事累，等一件事更累。佛门里向来把这些算作生死大事的反面，是要离弃的东西。可这句话偏说，尘劳即是解脱路门。同样一堆烦恼，前一刻是缠缚，后一刻竟可以是门径。中间隔着的，就是那一回光。 这话听起来像翻手为云，其实极朴素。一个人在路上被人撞了一下，火气往上冲，这是尘劳。火气冲上来的那一瞬，若能觉察到它正冲上来，火气立刻就被看穿，看穿之后它自己会散。这一觉察，就是门。门就开在火气最盛的那一点上。烦恼越是浓，越是当下，门反而越清楚。所谓烦恼即菩提，确有这样一条路可走，并非只是漂亮话。难处只在，人通常忙着跟那火气走，跟着它去骂人、去赌气、去想象一场报复的剧本，于是错过了门。 所以修行不必远求，不必等退休，不必等清闲，不必等去过某个圣地。锅里炖着汤的时候，会议拖到深夜的时候，都是地方。关键只在那一念肯不肯回头。肯回头，当下就是。 晨光从窗子里斜进来，落在水杯沿上，亮了一小圈，我又喝了一口。">
