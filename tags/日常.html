          <article class="post-card" data-search-card data-title="看云" data-tags="日常 正念" data-body="抬头的时候，云已经在那里了。 不知道它是什么时候来的，也不知道它从哪个方向飘过来。 它就是这样，一抬头，就看见了。 天很蓝，云很白，边缘有点毛，毛毛的，不太齐整。 风在高处吹，地上感觉不到，云却在动。 看着看着，一片云慢慢拉长了，中间细了一点，像是要断开，又没有断开。 旁边有一小片，本来是分开的，靠近了，慢慢连在一起，成了一片。 刚才那个形状，转眼就变了，成了另一个样子。 脖子有点酸，低头活动一下，再抬起来看，云的样子又变了。 干脆坐下来，靠着树，仰起头，脖子不酸了，看得也更久了。 有人说那片云像一只兔子，另一个人说不像，倒像一团棉花。两个人都在看同一片云，说出来的，各是各的样子。 过一会儿，兔子也好，棉花也好，都散开了，谁也说不出它现在像什么。 阳光被云挡住了一下，地上暗了一小块，凉了一点。云一移开，光又照回来，暖意跟着回来。 这片阴影落在地上，走过去，正好从脚边经过。 旁边一丛花，阴影掠过的时候，颜色暗了一下，光回来，颜色又亮了。 云走得很慢，好像不急着去哪里，风推着它，一点一点，往一个方向去。 一只鸟飞过去，穿过云的边缘，一下子就没入了白色里，再飞出来，还是那只鸟。 云底有一点灰，云顶还是亮的，被太阳照着。 远处天边的云，跟头顶的云，颜色淡一点，也小一点，看不清具体的形状。 眯着眼再看，那些细节都糊在一起，只剩一大片白，跟蓝天挨在一起。 更高的地方有一道细细的白痕，横着，慢慢散开，变宽，变淡，最后混进了云里。 云的边上有一点点淡淡的彩色，很浅，要仔细看才能看到。 呼吸慢慢跟着云的速度走。云不急，呼吸也不急。吸一口气，云挪了一点。呼出去，云又挪了一点。 心里想起一件没做完的事，飘了一下，又落回来，眼睛还是看着云。 一片云飘到了树梢那里，被树枝挡住一角，看不全了。 再往前飘，又露出来了，还是原来的样子，只是少了一角。 看了很久，脖子彻底酸了，低下头，看了看地面，草是绿的，很稳。 地上还有一小块阴影，慢慢移动着，跟着头顶那片云走。 阴影边缘毛毛的，跟云的边缘一样，不齐整。 再抬起头，找刚才那片云，已经找不到了，它变成了别的形状，混进了别的云里。 风还在吹，云还在走，一片接着一片，没有停下来的意思。 天上的云，这一刻的样子，只有这一刻有。 低下头，往前走了几步，风从耳边吹过去。 回头再看一眼天，云已经完全变了样，跟刚才出门时候的天，很不一样了。">
