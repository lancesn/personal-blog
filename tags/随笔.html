          <article class="post-card" data-search-card data-title="道不私藏，席不久居" data-tags="随笔" data-body="山寺后岭，有一间旧草堂。堂前一株老松，松下常置一席蒲团。来往行脚僧多在此歇脚，饮一盏泉水，听半日松风，再下山去。 草堂主人名寂然，年已七十，眉白如霜。他平日不讲经，不开坛，也不收徒。有人问法，他便扫地；有人求偈，他便添柴；有人远来请益，他只指门外松影，说：“看它。” 寺中小沙弥法安，跟随寂然三年，自觉已得几分门径。某日黄昏，他见师父又将一位云游僧让入堂中，亲自煮茶，敷席相待。那僧衣破履湿，言语粗直，坐下便问：“如何是祖师西来意？” 寂然递茶给他，说：“茶热，慢些。” 那僧喝罢，合掌而去。法安不解，问：“师父，此人来去匆匆，未曾懂得什么，何必待他如此？” 寂然说：“你看他鞋上的泥。” 法安低头，泥还留在门槛边。师父取水洗去，又将蒲团拍净。 法安心中更不平：“这席是师父多年静坐之处，岂可人人来坐？法若轻授，人若不敬，岂不糟蹋？” 寂然抬眼看他：“你坐这席多久了？” 法安答：“三年。” “还热么？” 法安一愣。 寂然说：“席若久居，便生我相。道若私藏，便成家业。你守着蒲团，以为守道；你护着门户，其实护着自己。” 法安低头不语。 次日，山中大雨。溪水暴涨，桥断路滑。一个樵夫背着受伤的孩子来到草堂前，请求避雨。法安见他满身泥水，怀中孩子哭声不止，忙说：“此处是清修之地，不便久留，前殿宽敞，可去那里。” 樵夫尚未答话，寂然已从堂内出来，将自己的蒲团铺在地上，让孩子躺下，又取旧袈裟覆其身。樵夫惶恐，说：“污了师父坐处。” 寂然说：“能安一人，便是坐处。” 雨到夜半方止。孩子醒来，伸手摸松针，笑了一声。寂然也笑。法安站在门边，忽觉堂中并无清浊之分，只有一盏将灭未灭的灯，照着几张疲惫的脸。 三日后，寂然让法安下山送米。法安回来时，见草堂空空，蒲团也不在。桌上留一纸： “道不私藏，席不久居。坐得住，不算得道；放得下，方免成障。此席今赠过岭人，汝自择一块石头坐去。” 法安四处寻找，只在山路旁见一位卖炭老人坐着那只旧蒲团，正给过客分热水。老人认得法安，笑说：“老和尚说，此席坐久了会长根，叫我替它走走。” 法安忽然怔住。山风吹来，松声满谷。他想起三年来自己日日守在师父身旁，怕别人问得太浅，怕外人坐得太久，怕草堂失了清净。原来清净若需护持，早已不清净；道若只在一人怀中，便同枯井无异。 他回到草堂，席已无，师亦无。松影仍在地上移来移去，从不为谁停留。法安取扫帚扫地，扫到门槛边那块旧泥痕，忽然笑出声来。 自此以后，草堂仍旧开着门。有人来问法，法安煮茶；有人来避雨，法安添柴；有人要借宿，法安让出床榻，自己在廊下坐一夜。 多年后，有僧问他：“师父从何处得法？” 法安指着门外空地说：“从失去一只蒲团处。” 那僧又问：“此法可传么？” 法安把茶盏推过去，说：“你喝了，便不在我这里。”">
